<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create your Aurora Store account." />
    <title>Sign Up | Aurora Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/css/main.css" />
    <script src="../assets/js/app.js" defer></script>
  </head>
  <body data-signup-page>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header" id="top">
      <div class="container site-header__inner">
        <a href="./index.html" class="brand" aria-label="Aurora Store home">
          <span class="brand__mark" aria-hidden="true">A</span>
          <span class="brand__name" data-i18n="brand.name">Aurora Store</span>
        </a>

        <button class="nav-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Main navigation" data-nav>
          <a class="site-nav__link" href="./index.html" data-i18n="nav.home">Home</a>
          <a class="site-nav__link" href="./shop.html" data-i18n="nav.shop">Shop</a>
          <a class="site-nav__link" href="./shop.html" data-i18n="nav.product">Products</a>
          <a class="site-nav__link" href="./cart.html" data-i18n="nav.cart">Cart</a>
          <a class="site-nav__link site-nav__link--active" href="./login.html" data-i18n="nav.login">Login</a>
        </nav>

        <div class="header-actions">
          <button class="icon-btn" type="button" aria-label="Toggle theme" data-theme-toggle>
            <span data-theme-icon aria-hidden="true">🌙</span>
          </button>
          <button class="icon-btn" type="button" aria-label="Switch language" data-lang-toggle>
            <span data-lang-icon>🇬🇧 EN</span>
          </button>
          <a class="icon-btn icon-btn--cart" href="./cart.html" aria-label="Open cart">
            <span aria-hidden="true">🛒</span>
            <span class="cart-counter" data-cart-count>0</span>
          </a>
        </div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="card auth-card">
            <h1 data-i18n="signup.title">Create account</h1>
            <p data-i18n="signup.subtitle">Join Aurora Store for exclusive offers</p>
            <form class="auth-form" data-signup-form>
              <div class="form-group">
                <label for="signup-name" data-i18n="signup.name">Full Name</label>
                <input type="text" id="signup-name" class="input" required />
              </div>
              <div class="form-group">
                <label for="signup-email" data-i18n="signup.email">Email</label>
                <input type="email" id="signup-email" class="input" required />
              </div>
              <div class="form-group">
                <label for="signup-password" data-i18n="signup.password">Password (min. 6 characters)</label>
                <input type="password" id="signup-password" class="input" required minlength="6" />
              </div>
              <div class="form-group">
                <label for="signup-confirm" data-i18n="signup.confirm">Confirm Password</label>
                <input type="password" id="signup-confirm" class="input" required />
              </div>
              <button type="submit" class="btn btn--primary btn--full" data-i18n="signup.button">Sign Up</button>
              <div class="form-feedback" data-signup-feedback></div>
            </form>
            <div class="auth-link">
              <span data-i18n="signup.hasAccount">Already have an account?</span>
              <a href="./login.html" class="link" data-i18n="signup.login">Sign in</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p data-i18n="footer.copyright">© 2026 Aurora Store. Crafted for modern commerce.</p>
        <div class="site-footer__links">
          <a href="./signup.html" data-i18n="footer.create">Create account</a>
          <a href="./checkout.html" data-i18n="footer.checkout">Checkout</a>
        </div>
      </div>
    </footer>

    <div class="toast-stack" aria-live="polite" aria-atomic="true" data-toast-stack></div>
  </body>
</html>
