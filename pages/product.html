<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View product details and add to cart." />
    <title>Aurora Store | Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <script src="../assets/js/app.js" defer></script>
  </head>
  <body data-product-page>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header" id="top">
      <div class="container site-header__inner">
        <a href="./index.html" class="brand" aria-label="Aurora Store home">
          <span class="brand__mark" aria-hidden="true">A</span>
          <span class="brand__name" data-i18n="brand.name">Aurora Store</span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Main navigation" data-nav>
          <a class="site-nav__link" href="./index.html" data-i18n="nav.home">Home</a>
          <a class="site-nav__link" href="./shop.html" data-i18n="nav.shop">Shop</a>
          <a class="site-nav__link site-nav__link--active" href="./product.html" data-i18n="nav.product">Product</a>
          <a class="site-nav__link" href="./cart.html" data-i18n="nav.cart">Cart</a>
          <a class="site-nav__link" href="./login.html" data-i18n="nav.login">Login</a>
        </nav>

        <div class="header-actions">
          <button class="icon-btn" type="button" aria-label="Toggle theme" data-theme-toggle>
            <span data-theme-icon aria-hidden="true">🌙</span>
          </button>
          <button class="icon-btn" type="button" aria-label="Switch text direction" data-dir-toggle>
            <span aria-hidden="true">RTL</span>
          </button>
          <button class="icon-btn" type="button" aria-label="Switch language" data-lang-toggle>
            <span data-lang-icon>🇬🇧 EN</span>
          </button>
          <a class="icon-btn icon-btn--cart" href="./cart.html" aria-label="Open cart">
            <span aria-hidden="true">🛒</span>
            <span class="cart-counter" data-cart-count>0</span>
          </a>
        </div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div data-product-not-found hidden class="card cart-empty">
            <h2 data-i18n="product.notfound.title">Product not found</h2>
            <p data-i18n="product.notfound.text">The product you're looking for doesn't exist.</p>
            <a href="./shop.html" class="btn btn--primary" style="margin-top: var(--space-2);" data-i18n="product.notfound.button">Browse Shop</a>
          </div>
          <div class="product-detail" data-product-container></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p data-i18n="footer.copyright">© 2026 Aurora Store. Crafted for modern commerce.</p>
        <div class="site-footer__links">
          <a href="./signup.html" data-i18n="footer.create">Create account</a>
          <a href="./checkout.html" data-i18n="footer.checkout">Checkout</a>
        </div>
      </div>
    </footer>

    <div class="toast-stack" aria-live="polite" aria-atomic="true" data-toast-stack></div>
  </body>
</html>
